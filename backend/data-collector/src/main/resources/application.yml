spring:
  profiles:
    # stub → StubDataProvider (fara cheie, fara cota). Orice alt profil → ApiFootballProvider
    # (necesita API_FOOTBALL_KEY). Comuta cu SPRING_PROFILES_ACTIVE / --spring.profiles.active.
    active: stub
  application:
    name: golstat-data-collector
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # nu legam consumatorii de numele clasei producatorului; tipul tinta se da la consumer
        spring.json.add.type.headers: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082

golstat:
  api-football:
    base-url: https://v3.football.api-sports.io
    api-key: ${API_FOOTBALL_KEY:}       # din env sau application-local.yml (gitignored); gol pe stub
    daily-request-limit: 7500           # cota planului PRO
    cache-ttl: 6h                       # cat tinem un raspuns in Redis inainte sa mai lovim API-ul
  collection:
    # Ligile de aici tin demo-ul STUB (StubDataProvider serveste liga 1, sezon 2024).
    # Tintele REALE (CM 2026 + campionatele europene) stau in application-local.yml, profil `local`.
    # Fereastra e inca fixa; devine rulanta (zile-in-urma / zile-inainte) la GS-11.
    leagues:
      - league-id: 1
        season: 2024
    from: 2024-08-01
    to: 2024-09-30
    interval-ms: 3600000       # o data pe ora
    initial-delay-ms: 5000
