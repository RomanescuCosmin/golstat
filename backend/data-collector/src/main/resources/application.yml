spring:
  profiles:
    # stub → StubDataProvider (fara cheie, fara cota). Orice alt profil → ApiFootballProvider
    # (necesita API_FOOTBALL_KEY). Comuta cu SPRING_PROFILES_ACTIVE / --spring.profiles.active.
    active: stub
  application:
    name: golstat-data-collector
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # nu legam consumatorii de numele clasei producatorului; tipul tinta se da la consumer
        spring.json.add.type.headers: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082

golstat:
  api-football:
    base-url: https://v3.football.api-sports.io
    api-key: ${API_FOOTBALL_KEY:}       # din env sau application-local.yml (gitignored); gol pe stub
    daily-request-limit: 7500           # cota planului PRO
    cache-ttl: 6h                       # default (catalog/clasament)
    ttl-upcoming: 1h                    # fixtures (contin meciuri viitoare/live)
    ttl-historic: 24h                   # evenimente de meci terminat (imuabile)
  collection:
    # Ligile de aici sunt pentru profilul STUB. Tintele REALE (CM 2026 + campionatele europene)
    # stau in application-local.yml, profil `local`.
    # NOTA: fereastra e rulanta fata de AZI (zile-in-urma / zile-inainte), deci fixtures-urile stub
    # (fixe pe 2024) cad in afara ei — lantul de colectare e acoperit de testele unitare, care dau
    # ferestre explicite. La rulare reala (profil local) fereastra prinde meciurile recente + viitoare.
    leagues:
      - league-id: 1
        season: 2024
    zile-in-urma: 90           # rezultate recente care hranesc forma
    zile-inainte: 10           # meciuri viitoare (NS)
    interval-ms: 3600000       # o data pe ora
    initial-delay-ms: 5000
  live:
    enabled: false             # bucla LIVE doar pe API real (activata in application-local.yml)
    poll-ms: 15000             # ritmul de poll cand exista meciuri in desfasurare
    window-before-minutes: 180 # cat timp dupa kickoff mai consideram meciul "live"
    window-after-minutes: 15   # cat inainte de kickoff pornim polul
