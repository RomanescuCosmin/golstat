# Profil `oneshot`: colectare declansata din Windows Task Scheduler (vezi scripts/colectare-oneshot.ps1).
# Un singur ciclu, apoi procesul iese — PC-ul poate reveni in sleep.
# Ruleaza cu:  SPRING_PROFILES_ACTIVE=oneshot  si  API_FOOTBALL_KEY=<cheia_ta>
# Fara secrete aici: cheia vine din env (${API_FOOTBALL_KEY}), deci fisierul e versionat.

golstat:
  api-football:
    # Din cei 7500 (plan PRO), 1500 raman INTANGIBILI pentru tintele zilnice. Backfill-ul istoric
    # de mai jos consuma doar restul, ca un sezon vechi sa nu lase programul de azi necolectat.
    rezerva-zilnica: 1500
  collection:
    mod: one-shot
    # ORDINEA = PRIORITATE. Etapa 1 (zilnic, fereastra rulanta) ruleaza intotdeauna inaintea etapei 2
    # (backfill, fereastra absoluta), indiferent de ordinea din lista.
    leagues:
      # --- ZILNIC: fereastra rulanta din zile-in-urma/zile-inainte ---
      # Amicalele au ~2100 de echipe: cu imbogatire pornita ar costa ~8400 requesturi (peste cota zilnica).
      # `doar-fixtures` opreste inainte de detalii si de imbogatire → 3 requesturi in total.
      # Lista acopera exact competitiile din frontend/src/lib/ligi.ts — o liga colectata dar neafisata
      # ar arde cota degeaba, iar una afisata dar necolectata ar aparea goala in interfata.
      - { league-id: 667, season: 2026, doar-fixtures: true }   # Amicale cluburi
      - { league-id: 1,   season: 2026 }   # Campionatul Mondial
      - { league-id: 283, season: 2026 }   # Romania - Liga I
      - { league-id: 2,   season: 2026 }   # UEFA Champions League
      - { league-id: 3,   season: 2026 }   # UEFA Europa League
      - { league-id: 848, season: 2026 }   # UEFA Conference League
      # Top 5 + restul campionatelor interne, sezonul CURENT (2026 = 2026/27, incepe in august).
      # Acum, in extrasezon, costa doar catalogul (~5 req/liga/zi); creste cand incep meciurile.
      - { league-id: 39,  season: 2026 }   # Premier League
      - { league-id: 140, season: 2026 }   # La Liga
      - { league-id: 135, season: 2026 }   # Serie A
      - { league-id: 78,  season: 2026 }   # Bundesliga
      - { league-id: 61,  season: 2026 }   # Ligue 1
      - { league-id: 94,  season: 2026 }   # Primeira Liga
      - { league-id: 88,  season: 2026 }   # Eredivisie
      - { league-id: 144, season: 2026 }   # Jupiler Pro League
      - { league-id: 203, season: 2026 }   # Super Lig
      - { league-id: 197, season: 2026 }   # Super League Greaca
      - { league-id: 113, season: 2026 }   # Allsvenskan (an calendaristic, joaca si vara)
      - { league-id: 103, season: 2026 }   # Eliteserien (an calendaristic, joaca si vara)
      - { league-id: 119, season: 2026 }   # Superliga daneza
      # Sezonul 2025 e deja in baza (195 meciuri, din vechiul profil `test`), iar 2026 incepe pe
      # 31 iulie cu 0 meciuri jucate — deci NU are nevoie de tinta de recuperare, doar de urmarire.
      - { league-id: 218, season: 2026 }   # Bundesliga Austria
      # Campionate adaugate pe 2026-07-21. Deocamdata DOAR zilnic (program + scoruri + clasament +
      # loturi). Tintele de backfill pe 2025 se adauga abia dupa `scripts/testeaza-acoperire.ps1`:
      # un sezon costa ~1200 requesturi si n-are rost platit la o liga unde furnizorul n-are
      # cornere/faulturi/cartonase (vezi Liga I, unde `/fixtures/statistics` intoarce results=0).
      - { league-id: 106, season: 2026 }   # Ekstraklasa (Polonia)
      - { league-id: 207, season: 2026 }   # Super League (Elvetia)
      - { league-id: 179, season: 2026 }   # Premiership (Scotia)
      - { league-id: 345, season: 2026 }   # Czech Liga (Cehia)
      - { league-id: 210, season: 2026 }   # HNL (Croatia)
      - { league-id: 271, season: 2026 }   # NB I (Ungaria)
      - { league-id: 172, season: 2026 }   # First League (Bulgaria)
      - { league-id: 286, season: 2026 }   # Super Liga (Serbia)
      - { league-id: 332, season: 2026 }   # Super Liga (Slovacia)
      - { league-id: 333, season: 2026 }   # Premier League (Ucraina)
      - { league-id: 383, season: 2026 }   # Ligat Ha'al (Israel)
      - { league-id: 318, season: 2026 }   # 1. Division (Cipru)
      - { league-id: 373, season: 2026 }   # 1. SNL (Slovenia)
      # An calendaristic: sezonul 2026 e in DESFASURARE, deci vor avea nevoie si de tinta de
      # recuperare (ca 113/103). O adaugam dupa ce testul confirma ca merita — altfel platim
      # fereastra absoluta degeaba.
      - { league-id: 244, season: 2026 }   # Veikkausliiga (Finlanda)
      - { league-id: 357, season: 2026 }   # Premier Division (Irlanda)
      - { league-id: 164, season: 2026 }   # Urvalsdeild (Islanda)
      # Ligile secunde: acelasi tratament, dar au mai multe echipe de imbogatit.
      - { league-id: 40,  season: 2026 }   # Championship
      - { league-id: 41,  season: 2026 }   # League One
      - { league-id: 141, season: 2026 }   # Segunda Division
      - { league-id: 136, season: 2026 }   # Serie B
      - { league-id: 79,  season: 2026 }   # 2. Bundesliga
      - { league-id: 62,  season: 2026 }   # Ligue 2
      - { league-id: 89,  season: 2026 }   # Eerste Divisie

      # --- BACKFILL sezonul trecut (2025 = 2025/26) ---
      # `from`/`to` fac tinta istorica: fereastra proprie, independenta de cea rulanta.
      # Datele stau intre GHILIMELE intentionat: nequotate, YAML le citeste ca timestamp
      # (java.util.Date) si conversia spre LocalDate esueaza la pornire.
      # Fereastra e larga intentionat (acopera si ligile de vara, ex. Allsvenskan/Eliteserien, care
      # joaca in an calendaristic); nu costa nimic in plus — `/fixtures` e filtrat oricum pe league+season.
      # Fiecare tinta terminata se marcheaza in Redis (golstat:backfill:<liga>:<sezon>) si nu se mai reia.
      # Cost estimat ~1200 requesturi per liga mare → ~4-5 ligi pe zi la 6000 disponibili.
      #
      # NU sunt in lista, fiindca sezonul 2025 e DEJA colectat (verificat in Postgres pe 2026-07-20):
      #   39 Premier League (380 meciuri), 140 La Liga (380), 135 Serie A (380), 40 Championship (558),
      #   144 Jupiler Pro (321), 61 Ligue 1 (310), 88 Eredivisie (309), 78 Bundesliga (308),
      #   plus 283 Liga I (321) si 218 Austria (195), care oricum se urmaresc zilnic.
      # Le tinem afara din config (nu doar marcate in cursor) ca un flush de Redis sa nu declanseze
      # o recolectare de ~9600 requesturi — mai mult decat cota pe o zi intreaga.
      - { league-id: 94,  season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Primeira Liga
      - { league-id: 203, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Super Lig
      - { league-id: 197, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Super League Greaca
      - { league-id: 141, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Segunda Division
      - { league-id: 136, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Serie B
      - { league-id: 79,  season: 2025, from: "2025-01-01", to: "2026-06-30" }   # 2. Bundesliga
      - { league-id: 62,  season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Ligue 2
      - { league-id: 113, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Allsvenskan
      - { league-id: 103, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Eliteserien
      - { league-id: 119, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Superliga daneza
      - { league-id: 41,  season: 2025, from: "2025-01-01", to: "2026-06-30" }   # League One
      - { league-id: 89,  season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Eerste Divisie
      # Adaugate pe 2026-07-22, dupa `scripts/testeaza-acoperire.ps1`: furnizorul chiar are
      # cornere + faulturi + cartonase pe sezonul 2025 la ligile astea, deci backfill-ul (~1200
      # requesturi/liga) produce piete, nu doar scoruri.
      - { league-id: 106, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Ekstraklasa
      - { league-id: 207, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Super League Elvetia
      - { league-id: 179, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Premiership Scotia
      - { league-id: 345, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Czech Liga
      - { league-id: 271, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # NB I Ungaria
      - { league-id: 286, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Super Liga Serbia
      - { league-id: 383, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Ligat Ha'al Israel
      # Re-sondate pe 12 meciuri intinse peste sezon (primul sondaj, pe UN singur meci, le clasase
      # gresit ca „doar scoruri" — nimerise exact meciuri fara date). Acoperirea reala a statisticilor:
      #   357 Irlanda 92%, 172 Bulgaria 75%, 318 Cipru 25%, 244 Finlanda 17%, 373 Slovenia 0%, 164 Islanda 0%.
      # Le luam pe toate: backfill-ul costa ~1200 requesturi indiferent daca vin statistici de echipa,
      # dar aduce oricum program, scoruri si cronologie — deci pietele de goluri merg peste tot, iar
      # la Slovenia si cele de cartonase (cronologia are evenimente de tip Card).
      - { league-id: 357, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Premier Division Irlanda
      - { league-id: 172, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # First League Bulgaria
      - { league-id: 318, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # 1. Division Cipru
      - { league-id: 244, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Veikkausliiga Finlanda
      - { league-id: 373, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # 1. SNL Slovenia
      - { league-id: 164, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Urvalsdeild Islanda
      # Re-sondate pe 2026-07-22: primul sondaj le raportase "fara meciuri terminate", dar era un
      # request esuat tranzitoriu tratat ca lipsa de date (bug reparat in testeaza-acoperire.ps1).
      # Au sezon 2025 complet: Croatia 180 meciuri terminate / acoperire 5/5, Slovacia 192 / 4/5,
      # Ucraina 243 / 3/5. Sezonul 2026 incepe la 25 iul - 1 aug cu 0 meciuri jucate, deci nu au
      # nevoie de tinta de recuperare.
      - { league-id: 210, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # HNL Croatia
      - { league-id: 332, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Super Liga Slovacia
      - { league-id: 333, season: 2025, from: "2025-01-01", to: "2026-06-30" }   # Premier League Ucraina

      # --- RECUPERARE sezon CURENT (2026) pentru ligile prinse la mijloc de sezon ---
      # REGULA, valabila ori de cate ori adaugi o liga noua in lista zilnica: fereastra rulanta
      # colecteaza doar de azi inainte, deci partea DEJA JUCATA a sezonului curent nu e ceruta de
      # nimeni. Daca liga e in desfasurare cand o adaugi, ii trebuie si o tinta cu fereastra absoluta.
      # Verificat la 2026-07-20 pe toate cele 26 de ligi: doar astea doua (an calendaristic, incep
      # primavara) aveau meciuri jucate — restul incep in august cu 0. Allsvenskan avea 103 meciuri
      # terminate la furnizor si 7 la noi; Eliteserien 105 si 0.
      # Aceeasi liga+sezon apare deliberat SI zilnic SI aici: tinta de backfill aduce o singura data
      # istoricul, apoi se marcheaza gata, iar cea zilnica o tine la zi mai departe.
      - { league-id: 113, season: 2026, from: "2026-01-01", to: "2026-12-31" }   # Allsvenskan
      - { league-id: 103, season: 2026, from: "2026-01-01", to: "2026-12-31" }   # Eliteserien
      # Adaugate pe 2026-07-22, dupa aceeasi regula. Verificat la furnizor in aceeasi zi cate meciuri
      # din sezonul 2026 erau deja jucate cand am adaugat liga — toate cad inaintea ferestrei rulante
      # de 3 zile, deci fara tinta absoluta s-ar fi pierdut definitiv:
      #   244 Finlanda 96, 357 Irlanda 121, 164 Islanda 91 (an calendaristic, la ~2/3 de sezon),
      #   172 Bulgaria 7, 373 Slovenia 5 (sezon toamna-primavara, abia inceput).
      # 318 Cipru avea 0 meciuri in 2026, deci nu are nevoie de recuperare.
      - { league-id: 244, season: 2026, from: "2026-01-01", to: "2026-12-31" }   # Veikkausliiga
      - { league-id: 357, season: 2026, from: "2026-01-01", to: "2026-12-31" }   # Premier Division Irlanda
      - { league-id: 164, season: 2026, from: "2026-01-01", to: "2026-12-31" }   # Urvalsdeild
      - { league-id: 172, season: 2026, from: "2026-01-01", to: "2026-12-31" }   # First League Bulgaria
      - { league-id: 373, season: 2026, from: "2026-01-01", to: "2026-12-31" }   # 1. SNL Slovenia

    # Fereastra rulanta pentru tintele zilnice. 3 zile = plasa de siguranta pentru detaliile publicate
    # cu intarziere de furnizor (statistici/evenimente apar la minute-ore dupa fluier): meciul ramane
    # in fereastra ~24 de cicluri, timp in care golul cache-uit scurt (ttl-detalii-goale) expira si
    # re-cerem. Costul: detaliile au TTL 24h, deci meciurile din zilele 2-3 se re-cer o data pe zi
    # (~800-1000 req/zi worst-case de weekend) — incape lejer in cota PRO cu rezerva.
    # Colectorul largeste oricum singur fereastra dupa o pauza (vezi UltimaRulare).
    zile-in-urma: 3
    # 60 de zile de program inainte. E GRATIS: acelasi apel /fixtures aduce si viitorul, iar meciurile
    # ne-terminate sunt sarite de bucla de detalii (nu au evenimente/statistici de cerut). Cu 2 zile,
    # ProgramPage — care cere 7 — ramanea aproape goala.
    # De ce 60 si nu 30: campionatele mari incep pe 21-28 august, adica exact peste marginea de 30 de
    # zile (Premier League pe 21 aug cadea cu O ZI in afara ferestrei). La 60 intra tot calendarul de
    # start al sezonului, deci programul e vizibil din timp, nu abia cand incepe.
    zile-inainte: 60
  live:
    # Bucla live n-are sens intr-un proces care ruleaza cateva minute si iese.
    enabled: false
