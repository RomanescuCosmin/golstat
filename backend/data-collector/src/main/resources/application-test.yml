# Profil `test`: O SINGURA liga, pentru colectare pas-cu-pas / verificat ca merge fara sa arzi cota.
# Ruleaza cu:  --spring.profiles.active=test --golstat.api-football.api-key=<cheia>
#
golstat:
  collection:
    leagues:
      - { league-id: 140, season: 2025 }   # La Liga — id-ul/sezonul pentru alta liga
    zile-in-urma: 14      # implicit MIC = test ieftin; pune 400 pentru backfill de sezon intreg
    zile-inainte: 14
  live:
    enabled: false
