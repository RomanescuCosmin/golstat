spring:
  application:
    name: golstat-api
  mvc:
    problemdetails:
      enabled: true          # erori ca RFC 7807 (application/problem+json)
  datasource:
    url: "jdbc:postgresql://127.0.0.1:5432/${golstat.database.name}"
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: update      # doar adauga schema noua; NU sterge date la pornire
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: golstat-api
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # loturile per liga (injuries) depasesc 1 MiB pe ligile mari; aliniat cu max.request.size de la producer
      properties:
        max.partition.fetch.bytes: 5242880

golstat:
  database:
    name: golstat
  cors:
    allowed-origins: http://localhost:5173
