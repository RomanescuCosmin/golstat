spring:
  application:
    name: golstat-api
  datasource:
    url: "jdbc:postgresql://127.0.0.1:5432/${golstat.database.name}"
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

golstat:
  database:
    name: golstat
